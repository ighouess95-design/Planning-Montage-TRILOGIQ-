<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Montage Atelier TRILOGIQ 2026 - Live Sync</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
/* ... Garde tes styles identiques ... */
*{box-sizing:border-box}
body{margin:0;padding:0;overflow:hidden;background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#1e293b}::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
.task-card{transition:all .15s ease;cursor:pointer}.task-card:hover{filter:brightness(1.08)}
.grid-line-v{position:absolute;top:0;bottom:0;width:1px;background:rgba(51,65,85,.5);pointer-events:none;z-index:1}
.grid-line-h{position:absolute;left:0;right:0;height:1px;background:rgba(51,65,85,.4);pointer-events:none;z-index:1}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef}=React;

// --- CONFIGURATION FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyAHW5lw_--l2iKu1cFtfgOhjN-bQ7dqtCY",
    authDomain: "planning-montage-trilogiq.firebaseapp.com",
    projectId: "planning-montage-trilogiq",
    storageBucket: "planning-montage-trilogiq.firebasestorage.app",
    messagingSenderId: "654966252510",
    appId: "1:654966252510:web:cd6fd2f29bb24993e6334f"
};

// Initialisation unique
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const database = firebase.database();

// ... Tes constantes (SIDEBAR_WIDTH, etc) ...
const SIDEBAR_WIDTH=160,OPERATOR_ROW_HEIGHT=90;
const OPERATOR_COLORS=['#8b5cf6','#d946ef','#0ea5e9','#4f46e5','#ec4899','#a78bfa','#2563eb','#14b8a6','#f43f5e','#ea580c'];
const TASK_COLORS=['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1','#d946ef','#14b8a6','#f43f5e','#eab308','#22c55e','#0ea5e9','#a855f7','#fb7185','#4ade80','#fbbf24','#ffffff'];

// ... Tes fonctions de calcul (getWorkHoursInRange, etc) ...
// (Gardons-les telles quelles dans ton fichier original)

/* COMPOSANTS IDENTIQUES (TaskCard, Clock, etc.) */
// [Conserve ici tous tes composants jusqu'à la fonction App]

const App=()=>{
  const[isReadOnly,setIsReadOnly]=useState(true);
  const[searchQuery,setSearchQuery]=useState('');
  const[viewWeeks,setViewWeeks]=useState(1);
  const[viewDate,setViewDate]=useState(getStartOfWeek(new Date()));
  const[tasks,setTasks]=useState([]); // Initialement vide, Firebase remplira
  const[operators,setOperators]=useState(initialOperators);
  const[isModalOpen,setIsModalOpen]=useState(false);
  const[saveStatus,setSaveStatus]=useState('idle');

  // --- CHARGEMENT SYNCHRO FIREBASE ---
  useEffect(() => {
    const dataRef = database.ref('trilogiq_data');
    dataRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        if (data.tasks) {
          const parsedTasks = data.tasks.map(t => ({
            ...t,
            start: new Date(t.start)
          }));
          setTasks(parsedTasks);
        }
        if (data.operators) setOperators(data.operators);
      }
    });
    return () => dataRef.off();
  }, []);

  // --- SAUVEGARDE SUR FIREBASE ---
  const handleSave = () => {
    setSaveStatus('saving');
    const dataToSave = {
      tasks: tasks.map(t => ({ ...t, start: t.start.toISOString() })),
      operators: operators,
      lastUpdate: new Date().toISOString()
    };

    database.ref('trilogiq_data').set(dataToSave)
      .then(() => {
        setSaveStatus('success');
        setTimeout(() => setSaveStatus('idle'), 2000);
      })
      .catch(err => {
        console.error("Erreur Firebase:", err);
        setSaveStatus('idle');
        alert("Erreur lors de la sauvegarde Cloud.");
      });
  };

  // ... Reste de tes fonctions (handleMoveTask, handleSaveTask, etc.) ...
  // Remplace simplement les appels de sauvegarde locaux par handleSave()
  
  return (
      /* Ton rendu JSX identique à l'original */
      <div className="h-screen w-screen bg-[#0f172a] text-gray-200 flex overflow-hidden select-none">
          {/* ... Contenu de ton App ... */}
          {/* Modifie ton bouton "Enregistrer" pour qu'il appelle handleSave */}
          <button onClick={handleSave} className="bg-emerald-600 px-8 py-2.5 rounded-xl font-black">
             {saveStatus === 'saving' ? 'SYNC...' : 'ENREGISTRER CLOUD'}
          </button>
      </div>
  );
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
