    const handleSave = () => {
        setSaveStatus('saving');
        const payload = {
            tasks: tasks.map(t => ({ ...t, start: t.start.toISOString() })),
            operators: operators,
            lastUpdate: new Date().toISOString()
        };

        database.ref('planning_trilogiq_data').set(payload)
            .then(() => {
                setSaveStatus('success');
                setTimeout(() => setSaveStatus('idle'), 2000);
            })
            .catch((err) => {
                console.error("Erreur Sync:", err);
                setSaveStatus('idle');
                alert("Erreur de connexion Cloud.");
