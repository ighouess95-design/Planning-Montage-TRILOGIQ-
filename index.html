*{box-sizing:border-box}
body{margin:0;padding:0;overflow:hidden;background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#1e293b}::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
#ops-list::-webkit-scrollbar{width:4px}
#ops-list::-webkit-scrollbar-track{background:transparent}
#ops-list::-webkit-scrollbar-thumb{background:#6366f1;border-radius:99px}
#ops-list::-webkit-scrollbar-thumb:hover{background:#818cf8}
.scrollbar-hide::-webkit-scrollbar{display:none}.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
@keyframes search-flash{0%,100%{border:2px solid rgba(251,191,36,.4);box-shadow:0 0 10px rgba(251,191,36,.2)}50%{border:2px solid rgba(251,191,36,1);box-shadow:0 0 35px rgba(251,191,36,.9);transform:scale(1.03)}}
.search-match-flash{animation:search-flash 1s infinite ease-in-out;z-index:100!important}
@keyframes bounce{0%,100%{transform:translateY(-10%)}50%{transform:none}}

.grid-line-v{position:absolute;top:0;bottom:0;width:1px;background:rgba(51,65,85,.5);pointer-events:none;z-index:1}
.grid-line-h{position:absolute;left:0;right:0;height:1px;background:rgba(51,65,85,.4);pointer-events:none;z-index:1}
input[type="date"]::-webkit-calendar-picker-indicator,input[type="time"]::-webkit-calendar-picker-indicator,input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(.8);cursor:pointer}
select option{background:#1e293b;color:white}
.in-progress-glow{box-shadow:0 0 0 2px white,0 0 20px rgba(255,255,255,.2)}

const OPERATOR_COLORS=['#8b5cf6','#d946ef','#0ea5e9','#4f46e5','#ec4899','#a78bfa','#2563eb','#14b8a6','#f43f5e','#ea580c'];
const TASK_COLORS=['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1','#d946ef','#14b8a6','#f43f5e','#eab308','#22c55e','#0ea5e9','#a855f7','#fb7185','#4ade80','#fbbf24','#ffffff'];
const MONTHS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const initialOperators=[
  {id:'1',name:'FRANCOIS',role:'Monteur',color:'#8b5cf6'},{id:'2',name:'KAMEL',role:'Monteur',color:'#d946ef'},
  {id:'3',name:'KALLO',role:'Monteur',color:'#0ea5e9'},{id:'4',name:'MANU',role:'Monteur',color:'#4f46e5'},
  {id:'5',name:'MOMO Z',role:'Monteur',color:'#ec4899'},{id:'6',name:'CHRISTIAN',role:'Monteur',color:'#a78bfa'},
  {id:'7',name:'SOFIANE',role:'Monteur',color:'#2563eb'},{id:'8',name:'GIBRIL',role:'Monteur',color:'#14b8a6'},
  {id:'9',name:'SORIBA',role:'Monteur',color:'#f43f5e'},{id:'10',name:'MEHREZ',role:'Monteur',color:'#ea580c'},

const getOperatorColor=(name,fixedColor)=>{if(fixedColor)return fixedColor;let h=0;for(let i=0;i<name.length;i++){h=((h<<5)-h)+name.charCodeAt(i);h=h&h;}return OPERATOR_COLORS[Math.abs(h%OPERATOR_COLORS.length)];};
const getContrastColor=(hex)=>{if(!hex||!hex.startsWith('#'))return'#ffffff';const r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16);if(isNaN(r))return'#ffffff';return((r*299+g*587+b*114)/1000)>=128?'#0f172a':'#ffffff';};

const getWeekNumber=(d)=>{const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-day);const ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-ys)/86400000)+1)/7);};
const getWorkHoursForDay=(d)=>{const day=d.getDay();if(day===0||day===6)return 0;if(day===3)return 7.5;if(day===5)return 3.5;return 8;};
const getWorkStartHour=(d)=>d.getDay()===5?{hour:8,minute:30}:{hour:8,minute:0};
const getWorkEndHour=(d)=>{const day=d.getDay();if(day===3)return{hour:16,minute:30};if(day===5)return{hour:12,minute:0};return{hour:17,minute:0};};
const getWorkHoursSinceStart=(d)=>{const day=d.getDay(),t=d.getHours()+d.getMinutes()/60;if(day===0||day===6)return 0;if(day===5){if(t<=8.5)return 0;return Math.min(3.5,t-8.5);}if(t<=8)return 0;if(t<=12)return t-8;if(t<=13)return 4;const e=getWorkEndHour(d);return 4+Math.max(0,Math.min(t,e.hour+e.minute/60)-13);};
const getClockTimeFromWorkHours=(d,wh)=>{const f=new Date(d);if(d.getDay()===5){const h=8.5+wh;f.setHours(Math.floor(h),Math.round((h%1)*60),0,0);return f;}if(wh<=4){const h=8+wh;f.setHours(Math.floor(h),Math.round((h%1)*60),0,0);}else{const h=13+(wh-4);f.setHours(Math.floor(h),Math.round((h%1)*60),0,0);}return f;};
const getWorkHoursInRange=(s,e)=>{const st=s.getTime(),et=e.getTime();if(et<=st)return 0;const day=s.getDay();if(day===0||day===6)return 0;if(day===5){const ws=new Date(s);ws.setHours(8,30,0,0);const we=new Date(s);we.setHours(12,0,0,0);return Math.max(0,(Math.min(et,we.getTime())-Math.max(st,ws.getTime()))/36e5);}const ws=new Date(s);ws.setHours(8,0,0,0);const wec=getWorkEndHour(s);const le=new Date(s);le.setHours(wec.hour,wec.minute,0,0);const ls=new Date(s);ls.setHours(12,0,0,0);const lend=new Date(s);lend.setHours(13,0,0,0);const as=Math.max(st,ws.getTime()),ae=Math.min(et,le.getTime());if(ae<=as)return 0;let dur=ae-as;if(as<ls.getTime()&&ae>lend.getTime())dur-=36e5;else if(as>=ls.getTime()&&as<lend.getTime())dur=Math.max(0,ae-lend.getTime());else if(ae>ls.getTime()&&ae<=lend.getTime())dur=Math.max(0,ls.getTime()-as);return Math.max(0,dur/36e5);};
const calculateTaskEnd=(task)=>{let cm=new Date(task.start);const eff=(task.status==='completed'&&task.realDuration!=null)?task.realDuration:task.duration;let left=Math.max(0.01,eff);let s=0;while(left>0.0001&&s<500){s++;const cap=getWorkHoursForDay(cm);if(cap===0){cm.setDate(cm.getDate()+1);const ns=getWorkStartHour(cm);cm.setHours(ns.hour,ns.minute,0,0);continue;}const wec=getWorkEndHour(cm);const eot=new Date(cm);eot.setHours(wec.hour,wec.minute,0,0);const avail=getWorkHoursInRange(cm,eot);if(left<=avail+0.0001){const awt=getWorkHoursSinceStart(cm);cm=getClockTimeFromWorkHours(cm,awt+left);left=0;}else{left-=avail;cm.setDate(cm.getDate()+1);const ns=getWorkStartHour(cm);cm.setHours(ns.hour,ns.minute,0,0);}}return cm;};
const calculateTaskStart=(end,dur)=>{let cm=new Date(end);let left=Math.max(0.01,dur);let s=0;while(left>0.0001&&s<500){s++;const cap=getWorkHoursForDay(cm);if(cap===0){cm.setDate(cm.getDate()-1);const we=getWorkEndHour(cm);cm.setHours(we.hour,we.minute,0,0);continue;}const wsc=getWorkStartHour(cm);const sot=new Date(cm);sot.setHours(wsc.hour,wsc.minute,0,0);const avail=getWorkHoursInRange(sot,cm);if(left<=avail+0.0001){const awt=getWorkHoursSinceStart(cm);cm=getClockTimeFromWorkHours(cm,Math.max(0,awt-left));left=0;}else{left-=avail;cm.setDate(cm.getDate()-1);const we=getWorkEndHour(cm);cm.setHours(we.hour,we.minute,0,0);}}return cm;};
const getStartOfWeek=(d)=>{const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);dt.setHours(0,0,0,0);return new Date(dt.setDate(diff));};
const addDays=(d,n)=>{const dt=new Date(d.valueOf());dt.setDate(dt.getDate()+n);return dt;};
const getDayName=(d)=>d.toLocaleDateString('fr-FR',{weekday:'long'});
const getDayOfMonth=(d)=>d.getDate();
const getOperatorDuration=(task,opId)=>{if(task.client==='CONGES')return task.duration;let ms=0,mc=0;task.operatorIds.forEach(id=>{const dv=task.operatorDurations?task.operatorDurations[id]:undefined;if(dv!=null&&!isNaN(dv)){ms+=dv;mc++;}});const my=task.operatorDurations?task.operatorDurations[opId]:undefined;if(my!=null&&!isNaN(my))return my;const auto=task.operatorIds.length-mc;if(auto<=0)return 0;return Math.max(0,task.duration-ms)/auto;};

const Clock=()=>{
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  const ft=new Intl.DateTimeFormat('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(now);
  return(
    <div style={{textAlign:'right'}}>
      <div style={{fontSize:'20px',fontWeight:900,color:'white',letterSpacing:'-0.02em',fontVariantNumeric:'tabular-nums'}}>{ft}</div>
      <div style={{fontSize:'9px',fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.1em'}}>{now.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</div>
    </div>
  );
};

const NotificationBell=({tasks})=>{
  const[isOpen,setIsOpen]=useState(false);
  const ref=useRef(null);
  const alerts=useMemo(()=>{
    const today=new Date();today.setHours(0,0,0,0);
    const t3=new Date(today);t3.setDate(today.getDate()+3);
    const out=[];
    tasks.forEach(task=>{
      if(task.status==='completed')return;
      (task.horsCatalogue||[]).forEach(item=>{out.push({type:item.received?'hc_received':'hc_risk',task,itemName:item.name,isReceived:item.received,receptionDate:item.receptionDate});});
      if(task.shippingDate){const sd=new Date(task.shippingDate);sd.setHours(0,0,0,0);if(sd>=today&&sd<=t3)out.push({type:'shipping_soon',task,date:sd});}
    });
    return out.sort((a,b)=>(a.type==='hc_risk'?-1:1));
  },[tasks]);
  useEffect(()=>{
    if(!isOpen)return;
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setIsOpen(false);};
    const k=(e)=>{if(e.key==='Escape')setIsOpen(false);};
    document.addEventListener('mousedown',h);document.addEventListener('keydown',k);
    return()=>{document.removeEventListener('mousedown',h);document.removeEventListener('keydown',k);};
  },[isOpen]);
  const risk=alerts.filter(a=>a.type==='hc_risk').length;
  const total=alerts.length;
  return(<div className="relative" ref={ref}>
    <button onClick={()=>setIsOpen(p=>!p)} className={`relative p-3 rounded-2xl transition-all group flex items-center justify-center ${risk>0?'bg-red-500/10 border border-red-500/30':'text-gray-400 hover:text-white hover:bg-slate-800'}`}>
      {risk>0&&<span className="absolute inset-0 rounded-2xl bg-red-500 animate-ping opacity-20 pointer-events-none"></span>}
      <BellIcon className={`transition-all h-6 w-6 z-10 ${risk>0?'text-red-500 animate-bounce':'text-gray-400 group-hover:text-white'}`}/>
      {total>0&&<span className={`absolute -top-1 -right-1 flex h-6 w-6 items-center justify-center rounded-full text-[11px] font-black text-white ring-4 ring-[#0f172a] z-20 ${risk>0?'bg-red-600':'bg-emerald-600'}`}>{total}</span>}
    </button>
    {isOpen&&(<div className="absolute right-0 mt-4 w-96 rounded-3xl bg-[#1e293b] shadow-2xl border border-slate-700 z-[2000] overflow-hidden">
      <div className="px-8 py-5 border-b border-slate-800 flex justify-between items-center">
        <span className="text-xl font-black text-white flex items-center gap-3"><span className={`w-1.5 h-6 rounded-full ${risk>0?'bg-red-600':'bg-emerald-600'}`}></span>Notifications</span>
        <span className={`text-white py-1 px-4 rounded-full text-xs font-black ${risk>0?'bg-red-600':'bg-emerald-600'}`}>{total} ALERTE{total>1?'S':''}</span>
      </div>
      <div className="max-h-96 overflow-y-auto divide-y divide-slate-800">

          {alert.type==='shipping_soon'?(<><p className="text-[11px] font-black text-blue-400 uppercase tracking-widest mb-1">🚚 Expédition imminente</p><p className="text-sm font-black text-white">{alert.task.client} — CMD {alert.task.orderNumber}</p><p className="text-[10px] text-slate-500 mt-1">Le {alert.date?alert.date.toLocaleDateString('fr-FR'):'?'}</p></>)
          :(<><p className={`text-[11px] font-black uppercase tracking-widest mb-1 ${alert.type==='hc_risk'?'text-red-400':'text-emerald-400'}`}>{alert.type==='hc_risk'?'⚠️ Pièce HC manquante':'✅ Pièce HC reçue'}</p><p className="text-sm font-black text-white">{alert.itemName}</p><p className="text-[10px] text-slate-500 mt-1">{alert.task.client} — CMD {alert.task.orderNumber}</p>{alert.receptionDate&&<p className="text-[10px] mt-1 flex items-center gap-1"><ClockIcon className={`h-3 w-3 ${alert.type==='hc_risk'?'text-amber-500':'text-emerald-500'}`}/><span className={alert.type==='hc_risk'?'text-amber-400 font-black':'text-emerald-400 font-black'}>Réception prévue : {new Date(alert.receptionDate).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})}</span></p>}</>)}
        </div>))}
      </div>
    </div>)}
  </div>);
};

const EditableSelect=({label,value,onChange,options,onOptionsChange})=>{
  const[isAdding,setIsAdding]=useState(false);const[newItem,setNewItem]=useState('');
  const handleAdd=()=>{if(newItem.trim()&&!options.includes(newItem.trim().toUpperCase())){onOptionsChange([...options,newItem.trim().toUpperCase()]);setNewItem('');setIsAdding(false);}};
  return(<div className="space-y-2">
    <div className="flex justify-between items-center">
      <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">{label}</label>
      <button type="button" onClick={()=>setIsAdding(!isAdding)} className="text-[9px] font-black text-blue-500 uppercase">{isAdding?'Annuler':'+ Liste'}</button>
    </div>
    {isAdding?(<div className="flex gap-2"><input autoFocus value={newItem} onChange={e=>setNewItem(e.target.value)} className="flex-1 bg-[#161d2b] border border-blue-500 rounded-2xl p-3 text-white text-xs font-bold outline-none uppercase" placeholder="NOUVEAU NOM..." onKeyDown={e=>e.key==='Enter'&&(e.preventDefault(),handleAdd())}/><button type="button" onClick={handleAdd} className="px-4 bg-blue-600 text-white rounded-xl font-bold text-xs">OK</button></div>)
    :(<select value={value} onChange={e=>onChange(e.target.value)} className="w-full bg-[#161d2b] border border-white/5 rounded-2xl p-5 text-white font-bold outline-none appearance-none uppercase"><option value="">SÉLECTIONNER...</option>{options.map(opt=><option key={opt} value={opt}>{opt}</option>)}</select>)}
  </div>);
};

const TaskModal=({isOpen,onClose,onSaveTask,operators,tasks,taskToEdit,designers,setDesigners,salespeople,setSalespeople})=>{
  const[client,setClient]=useState('');const[orderNumber,setOrderNumber]=useState('');const[duration,setDuration]=useState('');const[realDuration,setRealDuration]=useState(undefined);
  const[furnitureCount,setFurnitureCount]=useState('');const[startDate,setStartDate]=useState(new Date().toISOString().split('T')[0]);const[startTime,setStartTime]=useState('08:00');
  const[selectedOpIds,setSelectedOpIds]=useState([]);const[opStarts,setOpStarts]=useState({});const[opDurations,setOpDurations]=useState({});
  const[priority,setPriority]=useState('Normal');const[status,setStatus]=useState('planned');const[taskColor,setTaskColor]=useState(TASK_COLORS[0]);
  const[description,setDescription]=useState('');const[shippingDate,setShippingDate]=useState('');const[hcItems,setHcItems]=useState([]);
  const[receptionDate,setReceptionDate]=useState('');const[transmissionDateToBE,setTransmissionDateToBE]=useState('');const[designer,setDesigner]=useState('');
  const[deadlineBE,setDeadlineBE]=useState('');const[returnDateBE,setReturnDateBE]=useState('');const[salesperson,setSalesperson]=useState('');
  const[amount,setAmount]=useState('');const[transportCost,setTransportCost]=useState('');
  const[isManutan,setIsManutan]=useState(false);const[isPlaque,setIsPlaque]=useState(false);const[isTube,setIsTube]=useState(false);const[isHoshin,setIsHoshin]=useState(false);const[isReservation,setIsReservation]=useState(false);

  useEffect(()=>{
    if(taskToEdit){
      setClient(taskToEdit.client.toUpperCase());setOrderNumber(taskToEdit.orderNumber||'');setDuration(taskToEdit.duration);setRealDuration(taskToEdit.realDuration);setFurnitureCount(taskToEdit.furnitureCount||'');
      const sd=new Date(taskToEdit.start);setStartDate(sd.toISOString().split('T')[0]);setStartTime(sd.getHours().toString().padStart(2,'0')+':'+sd.getMinutes().toString().padStart(2,'0'));
      setSelectedOpIds(taskToEdit.operatorIds||[]);setOpStarts(taskToEdit.operatorStarts||{});setOpDurations(taskToEdit.operatorDurations||{});
      setPriority(taskToEdit.priority||'Normal');setStatus(taskToEdit.status||'planned');setTaskColor(taskToEdit.color||TASK_COLORS[0]);
      setDescription(taskToEdit.description||'');setShippingDate(taskToEdit.shippingDate||'');setHcItems(taskToEdit.horsCatalogue||[]);
      setReceptionDate(taskToEdit.receptionDate||'');setTransmissionDateToBE(taskToEdit.transmissionDateToBE||'');setDesigner(taskToEdit.designer||'');
      setDeadlineBE(taskToEdit.deadlineBE||'');setReturnDateBE(taskToEdit.returnDateBE||'');setSalesperson(taskToEdit.salesperson||'');
      setAmount(taskToEdit.amount||'');setTransportCost(taskToEdit.transportCost||'');
      setIsManutan(!!taskToEdit.isManutan);setIsPlaque(!!taskToEdit.isPlaque);setIsTube(!!taskToEdit.isTubeCutting);setIsHoshin(!!taskToEdit.isHoshin);setIsReservation(!!taskToEdit.isReservation);
    }else{
      setClient('');setOrderNumber('');setDuration('');setRealDuration(undefined);setFurnitureCount('');
      setStartDate(new Date().toISOString().split('T')[0]);setStartTime('08:00');
      setSelectedOpIds([]);setOpStarts({});setOpDurations({});setPriority('Normal');setStatus('planned');
      setTaskColor(TASK_COLORS[Math.floor(Math.random()*(TASK_COLORS.length-1))]);
      setDescription('');setShippingDate('');setHcItems([]);setReceptionDate('');setTransmissionDateToBE('');setDesigner('');setDeadlineBE('');setReturnDateBE('');setSalesperson('');setAmount('');setTransportCost('');
      setIsManutan(false);setIsPlaque(false);setIsTube(false);setIsHoshin(false);setIsReservation(false);
    }
  },[taskToEdit,isOpen]);

  useEffect(()=>{
    if(!taskToEdit&&selectedOpIds.length>0){
      const opId=selectedOpIds[selectedOpIds.length-1];
      const opTasks=tasks.filter(t=>t.operatorIds.includes(opId));
      if(opTasks.length>0){
        const latest=opTasks.reduce((a,b)=>calculateTaskEnd(a)>calculateTaskEnd(b)?a:b);
        const end=calculateTaskEnd(latest);
        setStartDate(end.toISOString().split('T')[0]);setStartTime(end.getHours().toString().padStart(2,'0')+':'+end.getMinutes().toString().padStart(2,'0'));
        setOpStarts(prev=>({...prev,[opId]:end.toISOString()}));
      }
    }
  },[selectedOpIds,tasks,taskToEdit]);

  const handleToggleSpecial=(type,val)=>{
    if(type==='manutan'){setIsManutan(val);if(val)setTaskColor('#ec4899');}
    else if(type==='reservation'){setIsReservation(val);if(val)setTaskColor('#facc15');}
    else if(type==='hoshin'){setIsHoshin(val);if(val)setTaskColor('#ffffff');}
    else if(type==='plaque')setIsPlaque(val);
    else if(type==='tube')setIsTube(val);
  };
  const toggleOp=(id)=>setSelectedOpIds(prev=>{
    if(prev.includes(id)){const ns={...opStarts};delete ns[id];setOpStarts(ns);const nd={...opDurations};delete nd[id];setOpDurations(nd);return prev.filter(o=>o!==id);}
    return[...prev,id];
  });
  const handleSubmit=(e)=>{
    e.preventDefault();
    if(!startDate||!startTime){alert("Veuillez renseigner la date et l'heure de début.");return;}
    const startDT=new Date(startDate+'T'+startTime);
    if(isNaN(startDT.getTime())){alert("Date ou heure invalide.");return;}
    const cleanStarts={};
    Object.entries(opStarts).forEach(([k,v])=>{if(v&&!isNaN(new Date(v).getTime()))cleanStarts[k]=v;});
    const newTask={
      id:taskToEdit?taskToEdit.id:Date.now().toString(),
      client:client.trim().toUpperCase(),orderNumber,
      duration:duration===''?0:parseFloat(duration),realDuration:realDuration?parseFloat(realDuration):undefined,
      furnitureCount:furnitureCount===''?0:parseInt(furnitureCount),
      start:startDT,operatorIds:selectedOpIds,operatorStarts:cleanStarts,operatorDurations:opDurations,
      priority,status,color:taskColor,description,shippingDate,horsCatalogue:hcItems,
      receptionDate,transmissionDateToBE,designer,deadlineBE,returnDateBE,salesperson,
      amount:amount===''?undefined:Number(amount),transportCost:transportCost===''?undefined:Number(transportCost),
      isManutan,isPlaque,isTubeCutting:isTube,isHoshin,isReservation
    };
    onSaveTask(newTask);onClose();
  };
  if(!isOpen)return null;
  return(
    <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[100000] p-4 backdrop-blur-xl">
      <div className="bg-[#1e2533] rounded-[2.5rem] border border-white/5 w-full max-w-3xl shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
        <div className="flex justify-between items-center px-10 py-8 border-b border-white/5 bg-[#161d2b]/50">
          <h2 className="text-2xl font-black text-white uppercase tracking-tight">{taskToEdit?'Modifier la Commande':'Nouvelle Commande Montage'}</h2>
          <button onClick={onClose} className="text-slate-500 hover:text-white"><XIcon className="h-8 w-8"/></button>
        </div>
        <form onSubmit={handleSubmit} className="flex-1 overflow-y-auto px-10 py-8 space-y-8 scrollbar-hide">
          <div className="flex flex-wrap gap-3">
            {[{label:'MANUTAN',state:isManutan,type:'manutan'},{label:'PLAQUE INTERNE',state:isPlaque,type:'plaque'},{label:'COUPE TUBE',state:isTube,type:'tube'},{label:'HOSHIN',state:isHoshin,type:'hoshin'},{label:'RÉSERVATION',state:isReservation,type:'reservation'}].map(item=>(
              <label key={item.label} className={`flex items-center gap-3 px-5 py-4 rounded-xl border cursor-pointer transition-all ${item.state?'bg-blue-600/20 border-blue-500 text-blue-400':'bg-[#161d2b] border-white/5 text-slate-500 hover:bg-white/5'}`}>
                <input type="checkbox" checked={item.state} onChange={e=>handleToggleSpecial(item.type,e.target.checked)} className="hidden"/>
                <div className={`w-5 h-5 border-2 rounded flex items-center justify-center ${item.state?'bg-blue-500 border-blue-500':'border-slate-700'}`}>{item.state&&<div className="w-2 h-2 bg-white rounded-sm"/>}</div>
                <span className="text-[10px] font-black uppercase tracking-widest">{item.label}</span>
              </label>
            ))}
          </div>
          <div className="grid grid-cols-2 gap-8">
            <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">N° DE COMMANDE *</label><input required value={orderNumber} onChange={e=>setOrderNumber(e.target.value.replace(/\D/g,''))} className="w-full bg-[#161d2b] border border-white/5 rounded-2xl p-5 text-white outline-none focus:border-blue-500 font-bold" placeholder="CHIFFRES UNIQUEMENT"/></div>
            <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">CLIENT *</label><input required value={client} onChange={e=>setClient(e.target.value.toUpperCase())} className="w-full bg-[#161d2b] border border-white/5 rounded-2xl p-5 text-white font-bold outline-none focus:border-blue-500 uppercase" placeholder="EX: HERMES"/></div>
            <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">NB DE MEUBLES</label><input type="number" value={furnitureCount} onChange={e=>setFurnitureCount(e.target.value===''?'':parseInt(e.target.value))} className="w-full bg-[#161d2b] border border-white/5 rounded-2xl p-5 text-white outline-none font-bold" placeholder="À définir"/></div>
            <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">EXPÉDITION</label><input type="date" value={shippingDate} onChange={e=>setShippingDate(e.target.value)} className="w-full bg-[#161d2b] border border-white/5 rounded-2xl p-5 text-white outline-none font-bold"/></div>

              </div>

                <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">RETOUR DU BE</label><input type="date" value={returnDateBE} onChange={e=>setReturnDateBE(e.target.value)} className="w-full bg-[#1e2533] border border-white/5 rounded-2xl p-5 text-white outline-none font-bold"/></div>

              </div>
              <div className="grid grid-cols-2 gap-8 pt-4 border-t border-white/5">
                <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">MONTANT COMMANDE (€)</label><input type="number" step="0.01" value={amount} onChange={e=>setAmount(e.target.value===''?'':parseFloat(e.target.value))} className="w-full bg-[#1e2533] border border-white/5 rounded-2xl p-5 text-white outline-none font-bold" placeholder="0.00 €"/></div>
                <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">COÛT TRANSPORT (€)</label><input type="number" step="0.01" value={transportCost} onChange={e=>setTransportCost(e.target.value===''?'':parseFloat(e.target.value))} className="w-full bg-[#1e2533] border border-white/5 rounded-2xl p-5 text-white outline-none font-bold" placeholder="0.00 €"/></div>
              </div>
            </div>
          </div>
          <div className="space-y-4 pt-4">
            <h3 className="text-[10px] font-black text-white uppercase tracking-widest ml-1">ASSIGNATION & DÉBUTS INDIVIDUELS *</h3>
            <div className="bg-[#161d2b] border border-white/5 rounded-3xl overflow-hidden divide-y divide-white/5">
              {operators.map(op=>{const isSel=selectedOpIds.includes(op.id);return(
                <div key={op.id} className={`flex items-center gap-6 p-6 hover:bg-white/5 transition-all ${isSel?'bg-white/5':''}`}>

                    <div className={`w-6 h-6 border-2 rounded flex items-center justify-center ${isSel?'bg-blue-500 border-blue-500':'border-slate-700 bg-slate-900'}`}>{isSel&&<div className="w-2.5 h-2.5 bg-white rounded-sm"/>}</div>

                    <span className="text-[15px] font-black text-slate-400 uppercase tracking-tight flex-1">{op.name}</span>

                  {isSel&&(<div className="flex items-center gap-3">

                    <div className="flex flex-col gap-1"><label className="text-[8px] font-black text-slate-500 uppercase">DURÉE (H)</label><input type="number" step="0.5" placeholder="Auto" value={opDurations[op.id]||''} onChange={e=>setOpDurations({...opDurations,[op.id]:parseFloat(e.target.value)})} className="bg-slate-900/50 border border-slate-700 rounded-lg p-2 text-[10px] text-white outline-none w-16 text-center font-bold"/></div>
                  </div>)}
                </div>
              );})}
            </div>
          </div>
          <div className="grid grid-cols-2 gap-8">
            <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">STATUT</label>

                  const pendingHC=(hcItems||[]).filter(i=>!i.received);
                  if(pendingHC.length>0){
                    alert(`⚠️ Impossible de terminer la commande :\n${pendingHC.length} pièce(s) HC non reçue(s) :\n${pendingHC.map(i=>` • ${i.name||'PIÈCE HC'}`).join('\n')}\n\nMarquez toutes les pièces HC comme reçues avant de terminer.`);
                    return;
                  }
                }
                setStatus(e.target.value);
              }} className="w-full bg-[#161d2b] border border-white/5 rounded-2xl p-5 text-white font-bold outline-none appearance-none">
                <option value="planned">Planifiée</option>
                <option value="in_progress">En cours</option>
                <option value="completed">Terminée</option>
              </select>
              {(hcItems||[]).some(i=>!i.received)&&<p className="text-[9px] text-amber-500 font-black uppercase mt-1 ml-1">⚠ {(hcItems||[]).filter(i=>!i.received).length} pièce(s) HC en attente — terminaison bloquée</p>}
            </div>
            <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">PRIORITÉ</label><select value={priority} onChange={e=>setPriority(e.target.value)} className="w-full bg-[#161d2b] border border-white/5 rounded-2xl p-5 text-white font-bold outline-none appearance-none"><option value="Normal">Normale</option><option value="Urgent">Urgente</option></select></div>
          </div>
          <div className="space-y-4 pt-4">
            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">COULEUR</label>
            <div className="flex flex-wrap gap-3 p-6 bg-[#161d2b] border border-white/5 rounded-3xl">

            </div>
          </div>
          <div className="space-y-4 pt-4 pb-10">
            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">COMMENTAIRES DE MONTAGE</label>

    </div>

};

const DashboardModal=({isOpen,onClose,tasks,operators,onUpdateTask})=>{
  const[selMonth,setSelMonth]=useState('all');
  const yr=new Date().getFullYear();
  const stats=useMemo(()=>{
    let thH=0,rlH=0,eff=0,furn=0;
    const today=new Date();today.setHours(0,0,0,0);
    const opS={};const clS={},salesS={};const pipe={planned:0,in_progress:0,completed:0};let tot=0;
    let bDays=0,bCnt=0,mDays=0,mCnt=0;const hcAll=[];let lateHc=0,pendHc=0;
    const beItems=[];let bePending=0,beLate=0,beCompleted=0;
    operators.forEach(op=>{opS[op.id]={count:0,completedCount:0,theoHours:0,realHours:0,furnitures:0,name:op.name,color:op.color};});
    const ft=tasks.filter(t=>{if(t.client==='CONGES')return false;if(selMonth==='all')return true;const d=new Date(t.start);return d.getMonth()===selMonth&&d.getFullYear()===yr;});
    ft.forEach(task=>{
      tot++;if(task.furnitureCount)furn+=task.furnitureCount;if(pipe[task.status]!==undefined)pipe[task.status]++;
      if(task.salesperson&&task.amount){const sp=task.salesperson.trim().toUpperCase();if(!salesS[sp])salesS[sp]={amount:0,count:0};salesS[sp].amount+=task.amount;salesS[sp].count++;}
      if(task.transmissionDateToBE&&task.returnDateBE){const d=(new Date(task.returnDateBE)-new Date(task.transmissionDateToBE))/(1000*3600*24);if(d>=0){bDays+=d;bCnt++;}}
      if(task.returnDateBE&&task.start){const d=(new Date(task.start)-new Date(task.returnDateBE))/(1000*3600*24);if(d>=0){mDays+=d;mCnt++;}}
      // Suivi BE détaillé
      if(task.receptionDate||task.transmissionDateToBE||task.deadlineBE){
        const hasReturn=!!task.returnDateBE;
        const dlPassed=task.deadlineBE&&!hasReturn&&new Date(task.deadlineBE)<today;
        const dlDiff=task.deadlineBE?Math.ceil((today-new Date(task.deadlineBE))/(1000*60*60*24)):null;
        if(hasReturn)beCompleted++;else if(dlPassed){beLate++;}else bePending++;
        beItems.push({client:task.client,orderNumber:task.orderNumber||'N/A',taskId:task.id,receptionDate:task.receptionDate,transmissionDate:task.transmissionDateToBE,deadlineBE:task.deadlineBE,returnDateBE:task.returnDateBE,designer:task.designer,salesperson:task.salesperson,shippingDate:task.shippingDate,shippingStatus:task.shippingStatus||'waiting',hasReturn,isLate:dlPassed,dlDiff});
      }
      if(task.status==='completed'&&task.realDuration!==undefined){thH+=task.duration;rlH+=task.realDuration;eff+=(task.duration-task.realDuration);}
      (task.horsCatalogue||[]).forEach(item=>{const rd=new Date(item.receptionDate);rd.setHours(0,0,0,0);const dd=Math.ceil((today-rd)/(1000*60*60*24));const late=!item.received&&dd>0;if(late)lateHc++;if(!item.received)pendHc++;hcAll.push({...item,client:task.client,orderNumber:task.orderNumber||'N/A',isLate:late,daysDiff:dd});});
      const cn=task.client.trim().toUpperCase();if(!clS[cn])clS[cn]={count:0};clS[cn].count++;
      task.operatorIds.forEach(opId=>{const op=opS[opId];if(op){op.count++;if(task.furnitureCount)op.furnitures+=(task.furnitureCount/(task.operatorIds.length||1));if(task.status==='completed'&&task.realDuration!==undefined){op.completedCount++;op.theoHours+=(task.duration/(task.operatorIds.length||1));op.realHours+=(task.realDuration/(task.operatorIds.length||1));}}});
    });
    return{totalOrders:tot,totalHoursReal:Math.round(rlH),efficiencyDelta:Math.round(eff),totalFurnitures:Math.round(furn),pipeline:pipe,lateHcCount:lateHc,hcItems:hcAll.sort((a,b)=>(b.isLate?1:0)-(a.isLate?1:0)||b.daysDiff-a.daysDiff),clients:Object.entries(clS).sort(([,a],[,b])=>b.count-a.count),operators:Object.values(opS).sort((a,b)=>(b.theoHours||b.furnitures)-(a.theoHours||a.furnitures)),sales:Object.entries(salesS).sort(([,a],[,b])=>b.amount-a.amount),avgBEDelay:bCnt>0?bDays/bCnt:0,avgMontageDelay:mCnt>0?mDays/mCnt:0,beItems:beItems.sort((a,b)=>(b.isLate?1:0)-(a.isLate?1:0)),bePending,beLate,beCompleted};
  },[tasks,operators,selMonth,yr]);
  if(!isOpen)return null;
  return(<div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[200] p-4 backdrop-blur-sm">

        <button onClick={onClose} className="p-3 bg-gray-800 text-gray-400 hover:text-white rounded-full border border-gray-700"><XIcon className="h-8 w-8"/></button>
      </div>

        <div className="bg-slate-900/50 p-1.5 rounded-3xl border border-slate-800 flex items-center overflow-x-auto gap-1">

          <div className="w-px h-6 bg-slate-800 mx-2 flex-shrink-0"></div>
          {MONTHS.map((m,i)=>(<button key={m} onClick={()=>setSelMonth(i)} className={`px-5 py-3 rounded-2xl text-[11px] font-black uppercase tracking-tighter whitespace-nowrap transition-all ${selMonth===i?'bg-slate-700 text-white border border-slate-600':'text-slate-500 hover:text-slate-300'}`}>{m}</button>))}
        </div>
      </div>
      <div className="flex-1 overflow-y-auto p-10 pt-2 space-y-10">
        <div className="grid grid-cols-5 gap-6">
          {[{l:'Production',v:stats.totalOrders,u:'Ordres',c:'text-white',b:'hover:border-blue-500/30'},{l:'Retards HC',v:stats.lateHcCount,u:'Pièces',c:stats.lateHcCount>0?'text-red-500 animate-pulse':'text-slate-700',b:'hover:border-red-500/50'},{l:'Volume Meubles',v:stats.totalFurnitures,u:'Unités',c:'text-white',b:'hover:border-blue-500/30'},{l:'Temps Réel',v:stats.totalHoursReal,u:'Heures',c:'text-green-400',b:'hover:border-green-500/30'},{l:'Efficacité',v:`${stats.efficiencyDelta>0?'+':''}${stats.efficiencyDelta}H`,u:'',c:stats.efficiencyDelta>=0?'text-emerald-400':'text-red-400',b:'hover:border-emerald-500/30'}].map((card,i)=>(
            <div key={i} className={`bg-slate-900/60 rounded-3xl p-6 border border-slate-800 flex flex-col justify-between group transition-all ${card.b}`}>
              <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{card.l}</span>
              <div className="flex items-baseline gap-2 mt-4"><span className={`text-4xl font-black ${card.c}`}>{card.v}</span>{card.u&&<span className="text-xs font-bold text-slate-600">{card.u}</span>}</div>
            </div>
          ))}
        </div>
        <div className="grid grid-cols-3 gap-8">
          <div className="col-span-2 space-y-8">
            <div className="bg-slate-900/40 rounded-3xl border border-slate-800 overflow-hidden">
              <div className="px-8 py-6 bg-slate-800/30 border-b border-slate-800 flex justify-between items-center">
                <h3 className="text-sm font-black text-white uppercase tracking-[0.2em] flex items-center gap-3"><ClockIcon className="h-4 w-4 text-amber-500"/>Suivi Pièces Hors Catalogue</h3>
                <span className="text-[10px] font-black text-red-500 uppercase">Retards: {stats.lateHcCount}</span>
              </div>
              <div className="overflow-auto max-h-64"><table className="w-full text-left">
                <thead className="text-[9px] text-slate-500 font-black uppercase bg-slate-950/50 sticky top-0"><tr><th className="px-8 py-4">Pièce HC</th><th className="px-4 py-4">Client / CMD</th><th className="px-4 py-4 text-center">Date Prévue</th><th className="px-4 py-4 text-center">Statut</th></tr></thead>
                <tbody className="divide-y divide-slate-800/50">
                  {stats.hcItems.length>0?stats.hcItems.map((hc,i)=>(<tr key={i} className={`hover:bg-slate-800/40 ${hc.isLate?'bg-red-500/5':''}`}><td className="px-8 py-4 font-black text-white text-xs uppercase">{hc.name}</td><td className="px-4 py-4"><div className="flex flex-col"><span className="text-[10px] font-black text-slate-400">{hc.client}</span><span className="text-[9px] text-slate-500">CMD {hc.orderNumber}</span></div></td><td className="px-4 py-4 text-center"><span className={`text-[10px] font-black ${hc.isLate?'text-red-500':'text-slate-400'}`}>{new Date(hc.receptionDate).toLocaleDateString('fr-FR')}</span></td><td className="px-4 py-4 text-center">{hc.received?<span className="px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-500 text-[8px] font-black border border-emerald-500/20 uppercase">Reçue</span>:hc.isLate?<span className="px-3 py-1 rounded-full bg-red-500/20 text-red-500 text-[8px] font-black border border-red-500/30 uppercase animate-pulse">Retard {hc.daysDiff}J</span>:<span className="px-3 py-1 rounded-full bg-slate-800 text-slate-400 text-[8px] font-black border border-slate-700 uppercase">En attente</span>}</td></tr>))
                  :<tr><td colSpan={4} className="py-12 text-center text-slate-600 font-bold italic text-sm">Aucune pièce HC.</td></tr>}
                </tbody>
              </table></div>
            </div>
            <div className="grid grid-cols-2 gap-8">
              <div className="bg-slate-900/40 rounded-3xl p-8 border border-slate-800">

                  {stats.sales.length===0&&<p className="text-center text-slate-600 text-xs italic py-4">Aucune donnée commerciale.</p>}

                </div>

const Chatbot=({messages,onSendMessage,onRestoreChat,isBotLoading})=>{
  const[isOpen,setIsOpen]=useState(false);const[inputValue,setInputValue]=useState('');const[isListening,setIsListening]=useState(false);
  const messagesEndRef=useRef(null);const recognitionRef=useRef(null);
  const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
  useEffect(()=>{if(isOpen)messagesEndRef.current?.scrollIntoView({behavior:"smooth"});},[messages,isOpen]);
  useEffect(()=>{
    if(!SpeechRec)return;const rec=new SpeechRec();rec.continuous=false;rec.lang='fr-FR';rec.interimResults=false;
    rec.onresult=(e)=>{setInputValue(p=>p?`${p} ${e.results[e.results.length-1][0].transcript}`:e.results[e.results.length-1][0].transcript);setIsListening(false);};
    rec.onerror=()=>setIsListening(false);rec.onend=()=>setIsListening(false);recognitionRef.current=rec;
  },[]);
  const handleSend=()=>{if(inputValue.trim()){onSendMessage(inputValue);setInputValue('');}};
  const handleKeyPress=(e)=>{if(e.key==='Enter'&&!isBotLoading)handleSend();};
  const toggleListen=()=>{if(!recognitionRef.current)return;if(isListening)recognitionRef.current.stop();else{recognitionRef.current.start();setIsListening(true);}};
  return(<>
    <div className={`fixed bottom-6 right-6 z-50 transition-transform ${isOpen?'scale-0':'scale-100'}`}>
      <button onClick={()=>setIsOpen(true)} className="p-4 bg-blue-600 text-white rounded-full shadow-lg hover:bg-blue-700"><ChatBotIcon className="h-8 w-8"/></button>
    </div>
    <div className={`fixed bottom-6 right-6 w-96 h-[580px] flex flex-col bg-gray-800/90 backdrop-blur-md rounded-2xl shadow-2xl z-50 transition-all duration-300 ${isOpen?'opacity-100 translate-y-0':'opacity-0 translate-y-10 pointer-events-none'}`}>
      <div className="flex items-center justify-between p-4 border-b border-gray-700 flex-shrink-0">
        <div className="flex items-center gap-2"><SparklesIcon className="h-6 w-6 text-blue-400"/><h3 className="text-lg font-bold text-white">PlanifAI</h3></div>
        <div className="flex items-center gap-2">
          <button onClick={onRestoreChat} className="text-[10px] font-black text-blue-400 hover:text-blue-300 uppercase px-2 py-1 border border-blue-400/30 rounded-lg">Restore</button>
          <button onClick={()=>setIsOpen(false)} className="text-gray-400 hover:text-white"><XIcon/></button>
        </div>
      </div>
      <div className="flex-1 p-4 overflow-y-auto space-y-4">
        {messages.map((msg,i)=>(<div key={i} className={`flex items-end gap-2 ${msg.sender==='user'?'justify-end':'justify-start'}`}>
          {msg.sender==='bot'&&<div className="h-8 w-8 rounded-full bg-blue-500 flex items-center justify-center flex-shrink-0"><ChatBotIcon className="h-5 w-5 text-white"/></div>}
          <div className={`max-w-xs rounded-2xl px-4 py-2 text-white ${msg.sender==='user'?'bg-blue-600 rounded-br-none':'bg-gray-700 rounded-bl-none'}`}>
            {msg.isLoading?<div className="flex items-center space-x-1"><span className="h-1.5 w-1.5 bg-white rounded-full animate-bounce"></span><span className="h-1.5 w-1.5 bg-white rounded-full animate-bounce" style={{animationDelay:'.15s'}}></span><span className="h-1.5 w-1.5 bg-white rounded-full animate-bounce" style={{animationDelay:'.3s'}}></span></div>:<p className="text-sm whitespace-pre-wrap">{msg.text}</p>}
          </div>
        </div>))}
        <div ref={messagesEndRef}/>
      </div>
      <div className="p-4 border-t border-gray-700 flex-shrink-0">
        <div className="relative">
          <input type="text" value={inputValue} onChange={e=>setInputValue(e.target.value)} onKeyPress={handleKeyPress} placeholder="Demandez quelque chose..." className="w-full bg-gray-700 rounded-full py-2 pl-4 pr-24 text-sm text-gray-200 placeholder-gray-400 focus:ring-2 focus:ring-blue-500 outline-none" disabled={isBotLoading}/>
          <div className="absolute inset-y-0 right-0 flex items-center">
            {SpeechRec&&<button type="button" onClick={toggleListen} className={`w-10 h-full flex items-center justify-center ${isListening?'text-red-500':'text-gray-400 hover:text-white'}`}><MicrophoneIcon/></button>}
            <button onClick={handleSend} disabled={isBotLoading||!inputValue.trim()} className="w-10 h-full flex items-center justify-center text-blue-400 hover:text-blue-200 disabled:text-gray-500"><SendIcon/></button>
          </div>
        </div>
      </div>
    </div>
  </>);
};

const Scheduler=({operators,tasks,onEditTask,onDeleteTask,onMoveTask,movingTaskId,setMovingTaskId,viewDate,viewWeeks,searchQuery,isReadOnly})=>{
  const containerRef=useRef(null);
  const[currentTime,setCurrentTime]=useState(new Date());
  const[hoverX,setHoverX]=useState(null);const[hoverInfo,setHoverInfo]=useState(null);

          else{const diff=newDate.getTime()-t.start.getTime();if(ut.operatorStarts){const ns={};Object.entries(ut.operatorStarts).forEach(([k,v])=>{ns[k]=new Date(new Date(v).getTime()+diff).toISOString();});ut.operatorStarts=ns;}}}
          return ut;
        }return t;
      });
      return realignAllTasks(nt);
    });
    setMovingTaskId(null);
  };

  const handleAddOp=()=>{if(!newOpName.trim())return;const op={id:Date.now().toString(),name:newOpName.toUpperCase(),role:newOpRole,color:`#${Math.floor(Math.random()*16777215).toString(16).padStart(6,'0')}`};setOperators(p=>[...p,op]);setNewOpName('');};

    localStorage.setItem('trilogiq_design_folders',JSON.stringify(designFolders));
    localStorage.setItem('trilogiq_operators',JSON.stringify(operators));
    fetch(JSONBIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Access-Key':JSONBIN_KEY},body:JSON.stringify(payload)})
      .then(r=>r.json()).then(()=>{setSaveStatus('success');setServerStatus('ok');setTimeout(()=>setSaveStatus('idle'),2000);})
      .catch(()=>{setServerStatus('offline');setSaveStatus('success');setTimeout(()=>setSaveStatus('idle'),2000);});
  };

        const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${geminiApiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:`${sys}\n\nUtilisateur: ${text}`}]}]})});
        const data=await resp.json();const bt=data.candidates?.[0]?.content?.parts?.[0]?.text||'Désolé, je ne peux pas répondre.';
        setMessages(p=>[...p,{sender:'bot',text:bt,timestamp:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}]);
      }
    }catch(e){setMessages(p=>[...p,{sender:'bot',text:'Erreur de connexion à Gemini. Vérifiez votre clé API.',timestamp:ts}]);}

            <div style={{marginBottom:'8px'}}>
              <div style={{display:'flex',backgroundColor:'#0f172a',borderRadius:'10px',padding:'3px',border:'1px solid #1e293b'}}>
                <button onClick={()=>setViewWeeks(1)} style={{flex:1,padding:'5px',fontSize:'9px',fontWeight:900,borderRadius:'8px',border:'none',cursor:'pointer',textTransform:'uppercase',backgroundColor:viewWeeks===1?'#2563eb':'transparent',color:viewWeeks===1?'white':'#64748b'}}>1 SEM.</button>
                <button onClick={()=>setViewWeeks(2)} style={{flex:1,padding:'5px',fontSize:'9px',fontWeight:900,borderRadius:'8px',border:'none',cursor:'pointer',textTransform:'uppercase',backgroundColor:viewWeeks===2?'#2563eb':'transparent',color:viewWeeks===2?'white':'#64748b'}}>2 SEM.</button>
              </div>
            </div>
            <div style={{fontSize:'10px',fontWeight:900,color:'#475569',textTransform:'uppercase',letterSpacing:'0.2em',marginBottom:'6px',paddingLeft:'2px'}}>ÉQUIPE ({operators.length})</div>
          </div>
          {/* LISTE SCROLLABLE */}
          <div id="ops-list" style={{flex:'1 1 0',overflowY:'auto',overflowX:'hidden',paddingLeft:'24px',paddingRight:'12px',paddingBottom:'8px',scrollbarWidth:'auto',scrollbarColor:'#6366f1 transparent'}}>
            {operators.map(op=>(<div key={op.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',marginBottom:'8px',borderRadius:'16px',backgroundColor:'rgba(30,41,59,0.8)',border:'1px solid rgba(71,85,105,0.4)'}}>
              <div style={{display:'flex',alignItems:'center',gap:'12px',minWidth:0,flex:1}}>
                <div style={{width:'38px',height:'38px',borderRadius:'50%',backgroundColor:op.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:900,color:'white',flexShrink:0,letterSpacing:'0.05em'}}>{op.name.substring(0,3).toUpperCase()}</div>
                <span style={{fontSize:'13px',fontWeight:800,color:'#e2e8f0',textTransform:'uppercase',letterSpacing:'0.03em',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{op.name}</span>
              </div>
              <button onClick={()=>setOperators(p=>p.filter(o=>o.id!==op.id))} title="Supprimer" style={{flexShrink:0,marginLeft:'8px',padding:'6px',borderRadius:'8px',backgroundColor:'rgba(51,65,85,0.8)',border:'1px solid rgba(71,85,105,0.4)',color:'#64748b',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.backgroundColor='#dc2626';e.currentTarget.style.color='white';}} onMouseLeave={e=>{e.currentTarget.style.backgroundColor='rgba(51,65,85,0.8)';e.currentTarget.style.color='#64748b';}}><TrashIcon className="h-4 w-4"/></button>
            </div>))}
          </div>
          {/* BAS FIXE */}
          <div className="flex-shrink-0 px-6 pb-6 pt-3">
            {/* SAUVEGARDE / RESTAURATION */}
            <div style={{marginBottom:'10px',display:'flex',gap:'6px'}}>
              <button onClick={()=>{
                const backup={version:2,date:new Date().toISOString(),tasks:tasks.map(t=>({...t,start:t.start.toISOString()})),operators,designFolders};
                const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
                const a=document.createElement('a');a.href=URL.createObjectURL(blob);
                const d=new Date();a.download=`trilogiq_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}.json`;
                a.click();URL.revokeObjectURL(a.href);
              }} title="Sauvegarder toutes les données" style={{flex:1,padding:'10px',backgroundColor:'rgba(99,102,241,.15)',border:'1px solid rgba(99,102,241,.4)',borderRadius:'12px',color:'#818cf8',fontSize:'9px',fontWeight:900,textTransform:'uppercase',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}}
                onMouseEnter={e=>{e.currentTarget.style.backgroundColor='rgba(99,102,241,.3)';}} onMouseLeave={e=>{e.currentTarget.style.backgroundColor='rgba(99,102,241,.15)';}}>
                <span style={{fontSize:'16px'}}>💾</span>BACKUP
              </button>
              <label title="Restaurer depuis un fichier de sauvegarde" style={{flex:1,padding:'10px',backgroundColor:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.3)',borderRadius:'12px',color:'#34d399',fontSize:'9px',fontWeight:900,textTransform:'uppercase',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}}
                onMouseEnter={e=>{e.currentTarget.style.backgroundColor='rgba(16,185,129,.2)';}} onMouseLeave={e=>{e.currentTarget.style.backgroundColor='rgba(16,185,129,.1)';}}>
                <span style={{fontSize:'16px'}}>📂</span>RESTORE
                <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{
                  const file=e.target.files[0];if(!file)return;
                  const reader=new FileReader();
                  reader.onload=ev=>{
                    try{
                      const data=JSON.parse(ev.target.result);
                      if(!data.tasks||!data.operators){alert('❌ Fichier invalide.');return;}
                      if(!window.confirm(`Restaurer la sauvegarde du ${new Date(data.date).toLocaleString('fr-FR')} ?\nCela remplacera toutes les données actuelles.`))return;
                      setTasks(data.tasks.map(t=>({...t,start:new Date(t.start),operatorStarts:t.operatorStarts||{}})));
                      setOperators(data.operators);
                      if(data.designFolders)setDesignFolders(data.designFolders);
                      alert('✅ Restauration réussie !');
                    }catch(err){alert('❌ Erreur de lecture du fichier.');}
                  };
                  reader.readAsText(file);
                  e.target.value='';
                }}/>
              </label>
            </div>
            <button onClick={handleResetFlux} className="w-full py-4 text-[10px] font-black text-amber-500 bg-amber-500/5 border border-amber-500/20 rounded-2xl uppercase tracking-[0.2em] hover:bg-amber-500/10 transition-all">⚡ RÉINITIALISER LE FLUX</button>
          </div>
        </>)}
      </aside>
      <main className="flex-1 flex flex-col" style={{minWidth:0}}>
        <header className="h-20 border-b border-slate-800 px-8 flex items-center justify-between bg-slate-900/30 flex-shrink-0">
          <div className="flex items-center gap-6">
            <button onClick={()=>setIsSidebarOpen(!isSidebarOpen)} className="p-2 text-slate-500 hover:text-white"><MenuIcon className="h-6 w-6"/></button>
            <div className="flex bg-slate-950 rounded-xl p-1.5 border border-slate-800">
              <button onClick={()=>setViewDate(addDays(viewDate,-7))} className="p-2 text-slate-500 hover:text-white"><ChevronLeftIcon className="h-4 w-4"/></button>
              <button onClick={()=>setViewDate(getStartOfWeek(new Date()))} className="px-6 text-[10px] font-black text-white uppercase">AUJOURD'HUI</button>
              <button onClick={()=>setViewDate(addDays(viewDate,7))} className="p-2 text-slate-500 hover:text-white"><ChevronRightIcon className="h-4 w-4"/></button>
            </div>
            <div className={`flex items-center gap-3 px-5 py-2 rounded-full border ${isReadOnly?'bg-amber-900/10 border-amber-500/30 text-amber-500':'bg-emerald-900/10 border-emerald-500/30 text-emerald-500'}`}>
              <div className={`w-2 h-2 rounded-full ${isReadOnly?'bg-amber-500':'bg-emerald-500 animate-pulse'}`}/>
              <span className="text-[9px] font-black uppercase">{isReadOnly?'LECTURE SEULE':'MODE ÉDITION'}</span>
              <button onClick={()=>setIsReadOnly(!isReadOnly)} className="ml-3 text-[8px] px-3 py-1 rounded-lg font-black bg-white text-slate-900 uppercase">{isReadOnly?'DÉVERROUILLER':'VERROUILLER'}</button>
            </div>
          </div>
          <div className="flex items-center gap-5">
            <div className="relative"><SearchIcon className="absolute left-4 top-3 h-4 w-4 text-slate-500"/><input type="text" placeholder="Chercher client..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="bg-slate-950/50 border border-slate-800 rounded-xl py-2.5 pl-12 pr-6 text-xs w-64 outline-none font-bold text-white"/></div>
            <button onClick={()=>setIsStatsOpen(true)} title="Statistiques & Analyses" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',padding:'8px 12px',backgroundColor:'rgba(99,102,241,0.15)',border:'1px solid rgba(99,102,241,0.4)',borderRadius:'12px',color:'#818cf8',cursor:'pointer',transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.backgroundColor='rgba(99,102,241,0.3)';e.currentTarget.style.borderColor='#818cf8';e.currentTarget.style.color='white';}} onMouseLeave={e=>{e.currentTarget.style.backgroundColor='rgba(99,102,241,0.15)';e.currentTarget.style.borderColor='rgba(99,102,241,0.4)';e.currentTarget.style.color='#818cf8';}}><ChartBarIcon className="h-5 w-5"/><span style={{fontSize:'8px',fontWeight:900,textTransform:'uppercase',letterSpacing:'0.05em',whiteSpace:'nowrap'}}>STATS</span></button>
            <button onClick={handleUndo} disabled={history.length===0} title="Annuler la dernière action (Ctrl+Z)" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',padding:'8px 12px',backgroundColor:history.length>0?'rgba(251,191,36,0.12)':'rgba(30,41,59,0.5)',border:`1px solid ${history.length>0?'rgba(251,191,36,0.4)':'rgba(51,65,85,0.5)'}`,borderRadius:'12px',color:history.length>0?'#fbbf24':'#334155',cursor:history.length>0?'pointer':'not-allowed',transition:'all .15s'}} onMouseEnter={e=>{if(history.length>0){e.currentTarget.style.backgroundColor='rgba(251,191,36,0.25)';e.currentTarget.style.color='white';}}} onMouseLeave={e=>{if(history.length>0){e.currentTarget.style.backgroundColor='rgba(251,191,36,0.12)';e.currentTarget.style.color='#fbbf24';}}}><UndoIcon className="h-5 w-5"/><span style={{fontSize:'8px',fontWeight:900,textTransform:'uppercase',letterSpacing:'0.05em',whiteSpace:'nowrap'}}>ANNULER</span></button>
            <div className="relative">
              <button onClick={()=>setShowApiInput(!showApiInput)} className={`p-2.5 border rounded-xl transition-all ${geminiApiKey?'bg-emerald-800/20 border-emerald-700 text-emerald-400':'bg-slate-800/50 border-slate-700 text-slate-400 hover:text-white'}`} title="Configurer Gemini API"><SparklesIcon className="h-5 w-5"/></button>
              {showApiInput&&(<div className="absolute right-0 top-full mt-2 w-80 bg-[#1e293b] border border-slate-700 rounded-2xl p-4 shadow-2xl z-[1000]">
                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">CLÉ API GEMINI (PlanifAI)</p>
                <input type="password" value={geminiApiKey} onChange={e=>setGeminiApiKey(e.target.value)} placeholder="AIzaSy..." className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white outline-none font-mono mb-3"/>
                <button onClick={()=>setShowApiInput(false)} className="w-full py-2 bg-blue-600 text-white text-[10px] font-black rounded-xl uppercase">Confirmer</button>
              </div>)}
            </div>
            <NotificationBell tasks={tasks}/>
            {/* Indicateur statut serveur */}
            {serverStatus==='ok'&&<div style={{display:'flex',alignItems:'center',gap:'5px',padding:'4px 10px',backgroundColor:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.3)',borderRadius:'10px'}} title="Connecté au serveur réseau"><div style={{width:'7px',height:'7px',borderRadius:'50%',backgroundColor:'#22c55e',boxShadow:'0 0 6px #22c55e'}}></div><span style={{fontSize:'9px',fontWeight:900,color:'#4ade80',textTransform:'uppercase'}}>RÉSEAU</span></div>}
            {serverStatus==='offline'&&<div style={{display:'flex',alignItems:'center',gap:'5px',padding:'4px 10px',backgroundColor:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:'10px'}} title="Serveur non disponible - mode local"><div style={{width:'7px',height:'7px',borderRadius:'50%',backgroundColor:'#ef4444'}}></div><span style={{fontSize:'9px',fontWeight:900,color:'#f87171',textTransform:'uppercase'}}>HORS LIGNE</span></div>}
            {serverStatus==='local'&&<div style={{display:'flex',alignItems:'center',gap:'5px',padding:'4px 10px',backgroundColor:'rgba(99,102,241,.1)',border:'1px solid rgba(99,102,241,.3)',borderRadius:'10px'}} title="Mode fichier local"><div style={{width:'7px',height:'7px',borderRadius:'50%',backgroundColor:'#818cf8'}}></div><span style={{fontSize:'9px',fontWeight:900,color:'#a5b4fc',textTransform:'uppercase'}}>LOCAL</span></div>}
            <button onClick={handleSave} disabled={saveStatus!=='idle'} className={`px-8 py-2.5 rounded-xl font-black text-[10px] uppercase shadow-lg transition-all flex items-center gap-2 ${saveStatus==='success'?'bg-green-500 text-white':saveStatus==='saving'?'bg-emerald-700 text-white/70 cursor-wait':'bg-emerald-600 text-white hover:bg-emerald-500 active:scale-95'}`}>
              {saveStatus==='saving'?'ENREGISTREMENT...':(saveStatus==='success'?<><CheckCircleIcon className="h-4 w-4"/> SAUVEGARDÉ !</>:<><SaveIcon className="h-4 w-4"/> ENREGISTRER</>)}
            </button>
          </div>
        </header>
        <div className="flex-1 relative overflow-hidden">
          <Scheduler operators={operators} tasks={tasks} viewDate={viewDate} viewWeeks={viewWeeks} searchQuery={searchQuery} isReadOnly={isReadOnly}
            onEditTask={(t)=>{if(!isReadOnly){setEditingTask(t);setIsModalOpen(true);}}} onDeleteTask={handleDeleteTask}
            onMoveTask={handleMoveTask} movingTaskId={movingTaskId} setMovingTaskId={setMovingTaskId}/>
        </div>
      </main>
      <TaskModal isOpen={isModalOpen} onClose={()=>{setIsModalOpen(false);setEditingTask(null);}} operators={operators} tasks={tasks} taskToEdit={editingTask} onSaveTask={handleSaveTask} designers={designers} setDesigners={setDesigners} salespeople={salespeople} setSalespeople={setSalespeople}/>
      <DesignModal isOpen={isDesignModalOpen} onClose={()=>setIsDesignModalOpen(false)} folders={designFolders} onSave={(f)=>setDesignFolders(prev=>{const i=prev.findIndex(x=>x.id===f.id);if(i!==-1){const u=[...prev];u[i]=f;return u;}return[...prev,f];})} onDelete={(id)=>setDesignFolders(p=>p.filter(x=>x.id!==id))}/>
      <DashboardModal isOpen={isStatsOpen} onClose={()=>setIsStatsOpen(false)} tasks={tasks} operators={operators} onUpdateTask={(taskId,patch)=>setTasks(prev=>prev.map(t=>t.id===taskId?{...t,...patch}:t))}/>
      <Chatbot messages={messages} onSendMessage={handleSendMessage} onRestoreChat={()=>setMessages([{sender:'bot',text:'Interface TRILOGIQ restaurée. Le flux de production est prêt.',timestamp:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}])} isBotLoading={isBotLoading}/>
    </div>
  );
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
