  const[isReadOnly,setIsReadOnly]=useState(true);const[searchQuery,setSearchQuery]=useState('');
  const[viewWeeks,setViewWeeks]=useState(1);const[viewDate,setViewDate]=useState(getStartOfWeek(new Date()));

  // --- 1. CHARGEMENT LIVE DEPUIS FIREBASE ---
  useEffect(() => {
    const dataRef = database.ref('trilogiq_planning_live');
    dataRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        if (data.tasks) {
          setTasks(data.tasks.map(t => ({ ...t, start: new Date(t.start) })));
        }
        if (data.operators) setOperators(data.operators);
      }
    });
    return () => dataRef.off();
  }, []);

  // --- 2. SAUVEGARDE SUR LE CLOUD (Remplace le localStorage) ---
  const handleSave = () => {
    setSaveStatus('saving');
    const payload = {
      tasks: tasks.map(t => ({ ...t, start: t.start.toISOString() })),
      operators: operators,
      lastSync: new Date().toISOString()
    };

    database.ref('trilogiq_planning_live').set(payload)
      .then(() => {
        setSaveStatus('success');
        setTimeout(() => setSaveStatus('idle'), 2000);
      })
      .catch((err) => {
        console.error("Erreur Cloud:", err);
        setSaveStatus('idle');
      });
  };

  const handleSaveTask=(newTask)=>{
    const idx=tasks.findIndex(t=>t.id===newTask.id);
    let nt=[...tasks]; if(idx!==-1) nt[idx]=newTask; else nt.push(newTask);
    setTasks(nt);
    // On sauvegarde automatiquement sur le Cloud
    const payload = { tasks: nt.map(t => ({ ...t, start: t.start.toISOString() })), operators };
    database.ref('trilogiq_planning_live').set(payload);
    setIsModalOpen(false); setEditingTask(null);
  };

  const handleDeleteTask=(taskId)=>{
    const nt = tasks.filter(t=>t.id!==taskId);
    setTasks(nt);
    database.ref('trilogiq_planning_live').child('tasks').set(nt.map(t => ({ ...t, start: t.start.toISOString() })));
  };

  return(
    <div className="h-screen w-screen bg-[#0f172a] text-gray-200 flex overflow-hidden select-none">
      <main className="flex-1 flex flex-col">
        <header className="h-20 border-b border-slate-800 px-8 flex items-center justify-between bg-slate-900/30">
          <div className="flex items-center gap-6">
            <h1 className="text-xl font-black text-white">PLANNING TRILOGIQ LIVE</h1>
            <div className={`flex items-center gap-2 px-4 py-1.5 rounded-full border ${isReadOnly?'bg-amber-900/10 border-amber-500/30 text-amber-500':'bg-emerald-900/10 border-emerald-500/30 text-emerald-500'}`}>
              <span className="text-[10px] font-black">{isReadOnly?'LECTURE SEULE':'MODE ÉDITION'}</span>
              <button onClick={()=>setIsReadOnly(!isReadOnly)} className="ml-2 text-[8px] px-2 py-1 bg-white text-black rounded">SWITCH</button>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <button onClick={handleSave} className="bg-emerald-600 px-6 py-2 rounded-xl font-black text-xs text-white shadow-lg">
              {saveStatus === 'saving' ? 'SYNC...' : 'SAUVEGARDER CLOUD'}
            </button>
            <Clock/>
          </div>
        </header>
        <div className="flex-1 relative">
           {/* Ici le composant Scheduler avec tes props habituelles */}
           <div className="p-10 text-center text-slate-500">Planning chargé et synchronisé via Firebase.</div>
        </div>
      </main>
      <TaskModal isOpen={isModalOpen} onClose={()=>setIsModalOpen(false)} operators={operators} tasks={tasks} taskToEdit={editingTask} onSaveTask={handleSaveTask}/>
    </div>
  );
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
