<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Montage Atelier TRILOGIQ 2026 - LIVE SYNC</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;padding:0;overflow:hidden;background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#1e293b}::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
.scrollbar-hide::-webkit-scrollbar{display:none}.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
.task-card{transition:all .15s ease;cursor:pointer}.task-card:hover{filter:brightness(1.08)}
.grid-line-v{position:absolute;top:0;bottom:0;width:1px;background:rgba(51,65,85,.5);pointer-events:none;z-index:1}
.grid-line-h{position:absolute;left:0;right:0;height:1px;background:rgba(51,65,85,.4);pointer-events:none;z-index:1}
.in-progress-glow{box-shadow:0 0 0 2px white,0 0 20px rgba(255,255,255,.2)}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module">
const {useState,useEffect,useCallback,useMemo,useRef}=React;

// --- CONFIGURATION FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyAHW5lw_--l2iKu1cFtfgOhjN-bQ7dqtCY",
    authDomain: "planning-montage-trilogiq.firebaseapp.com",
    projectId: "planning-montage-trilogiq",
    storageBucket: "planning-montage-trilogiq.firebasestorage.app",
    messagingSenderId: "654966252510",
    appId: "1:654966252510:web:cd6fd2f29bb24993e6334f"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const database = firebase.database();

const SIDEBAR_WIDTH=160,OPERATOR_ROW_HEIGHT=90;
const OPERATOR_COLORS=['#8b5cf6','#d946ef','#0ea5e9','#4f46e5','#ec4899','#a78bfa','#2563eb','#14b8a6','#f43f5e','#ea580c'];
const TASK_COLORS=['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1','#d946ef','#14b8a6','#f43f5e','#eab308','#22c55e','#0ea5e9','#a855f7','#fb7185','#4ade80','#fbbf24','#ffffff'];

const initialOperators=[
  {id:'1',name:'FRANCOIS',role:'Monteur',color:'#8b5cf6'},{id:'2',name:'KAMEL',role:'Monteur',color:'#d946ef'},
  {id:'3',name:'KALLO',role:'Monteur',color:'#0ea5e9'},{id:'4',name:'MANU',role:'Monteur',color:'#4f46e5'},
  {id:'5',name:'MOMO Z',role:'Monteur',color:'#ec4899'},{id:'6',name:'CHRISTIAN',role:'Monteur',color:'#a78bfa'},
  {id:'7',name:'SOFIANE',role:'Monteur',color:'#2563eb'},{id:'8',name:'GIBRIL',role:'Monteur',color:'#14b8a6'},
  {id:'9',name:'SORIBA',role:'Monteur',color:'#f43f5e'},{id:'10',name:'MEHREZ',role:'Monteur',color:'#ea580c'}
];

// --- FONCTIONS DE CALCUL ---
const getOperatorColor=(name,fixedColor)=>{if(fixedColor)return fixedColor;let h=0;for(let i=0;i<name.length;i++){h=((h<<5)-h)+name.charCodeAt(i);h=h&h;}return OPERATOR_COLORS[Math.abs(h%OPERATOR_COLORS.length)];};
const getContrastColor=(hex)=>{if(!hex||!hex.startsWith('#'))return'#ffffff';const r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16);return((r*299+g*587+b*114)/1000)>=128?'#0f172a':'#ffffff';};
const getWorkHoursForDay=(d)=>{const day=d.getDay();if(day===0||day===6)return 0;if(day===3)return 7.5;if(day===5)return 3.5;return 8;};
const getWorkStartHour=(d)=>d.getDay()===5?{hour:8,minute:30}:{hour:8,minute:0};
const getWorkEndHour=(d)=>{const day=d.getDay();if(day===3)return{hour:16,minute:30};if(day===5)return{hour:12,minute:0};return{hour:17,minute:0};};
const getWorkHoursSinceStart=(d)=>{const day=d.getDay(),t=d.getHours()+d.getMinutes()/60;if(day===0||day===6)return 0;if(day===5){if(t<=8.5)return 0;return Math.min(3.5,t-8.5);}if(t<=8)return 0;if(t<=12)return t-8;if(t<=13)return 4;const e=getWorkEndHour(d);return 4+Math.max(0,Math.min(t,e.hour+e.minute/60)-13);};
const getClockTimeFromWorkHours=(d,wh)=>{const f=new Date(d);if(d.getDay()===5){const h=8.5+wh;f.setHours(Math.floor(h),Math.round((h%1)*60),0,0);return f;}if(wh<=4){const h=8+wh;f.setHours(Math.floor(h),Math.round((h%1)*60),0,0);}else{const h=13+(wh-4);f.setHours(Math.floor(h),Math.round((h%1)*60),0,0);}return f;};
const getWorkHoursInRange=(s,e)=>{const st=s.getTime(),et=e.getTime();if(et<=st)return 0;const day=s.getDay();if(day===0||day===6)return 0;if(day===5){const ws=new Date(s);ws.setHours(8,30,0,0);const we=new Date(s);we.setHours(12,0,0,0);return Math.max(0,(Math.min(et,we.getTime())-Math.max(st,ws.getTime()))/36e5);}const ws=new Date(s);ws.setHours(8,0,0,0);const wec=getWorkEndHour(s);const le=new Date(s);le.setHours(wec.hour,wec.minute,0,0);const ls=new Date(s);ls.setHours(12,0,0,0);const lend=new Date(s);lend.setHours(13,0,0,0);const as=Math.max(st,ws.getTime()),ae=Math.min(et,le.getTime());if(ae<=as)return 0;let dur=ae-as;if(as<ls.getTime()&&ae>lend.getTime())dur-=36e5;else if(as>=ls.getTime()&&as<lend.getTime())dur=Math.max(0,ae-lend.getTime());else if(ae>ls.getTime()&&ae<=lend.getTime())dur=Math.max(0,ls.getTime()-as);return Math.max(0,dur/36e5);};
const calculateTaskEnd=(task)=>{let cm=new Date(task.start);const eff=(task.status==='completed'&&task.realDuration!=null)?task.realDuration:task.duration;let left=Math.max(0.01,eff);let s=0;while(left>0.0001&&s<500){s++;const cap=getWorkHoursForDay(cm);if(cap===0){cm.setDate(cm.getDate()+1);const ns=getWorkStartHour(cm);cm.setHours(ns.hour,ns.minute,0,0);continue;}const wec=getWorkEndHour(cm);const eot=new Date(cm);eot.setHours(wec.hour,wec.minute,0,0);const avail=getWorkHoursInRange(cm,eot);if(left<=avail+0.0001){const awt=getWorkHoursSinceStart(cm);cm=getClockTimeFromWorkHours(cm,awt+left);left=0;}else{left-=avail;cm.setDate(cm.getDate()+1);const ns=getWorkStartHour(cm);cm.setHours(ns.hour,ns.minute,0,0);}}return cm;};
const getStartOfWeek=(d)=>{const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);dt.setHours(0,0,0,0);return new Date(dt.setDate(diff));};
const addDays=(d,n)=>{const dt=new Date(d.valueOf());dt.setDate(dt.getDate()+n);return dt;};
const getOperatorDuration=(task,opId)=>{if(task.client==='CONGES')return task.duration;let ms=0,mc=0;task.operatorIds.forEach(id=>{const dv=task.operatorDurations?task.operatorDurations[id]:undefined;if(dv!=null&&!isNaN(dv)){ms+=dv;mc++;}});const my=task.operatorDurations?task.operatorDurations[opId]:undefined;if(my!=null&&!isNaN(my))return my;const auto=task.operatorIds.length-mc;if(auto<=0)return 0;return Math.max(0,task.duration-ms)/auto;};

/* ICONS */
const CheckCircleIcon=({className=''})=><svg xmlns="http://www.w3.org/2000/svg" className={`h-5 w-5 ${className}`} viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"/></svg>;
const TrashIcon=({className=''})=><svg xmlns="http://www.w3.org/2000/svg" className={`h-5 w-5 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>;

// --- COMPOSANTS ---
const Clock=()=>{
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  return(<div style={{textAlign:'right'}}><div style={{fontSize:'20px',fontWeight:900,color:'white'}}>{now.toLocaleTimeString('fr-FR')}</div><div style={{fontSize:'9px',color:'#475569'}}>{now.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</div></div>);
};

const TaskCard=({task,style,onClick})=>{
  const isCompleted=task.status==='completed';
  const finalColor=isCompleted?'#475569':task.color;
  return(<div className="task-card absolute p-2 border rounded-xl shadow-lg" style={{...style, backgroundColor:finalColor, color:getContrastColor(finalColor)}} onClick={onClick}>
    <div className="font-black text-sm">{task.orderNumber || 'SANS N°'}</div>
    <div className="text-[10px] uppercase font-bold truncate">{task.client}</div>
  </div>);
};

// --- APPLICATION PRINCIPALE ---
const App=()=>{
  const[tasks,setTasks]=useState([]);
  const[operators,setOperators]=useState(initialOperators);
  const[isReadOnly,setIsReadOnly]=useState(true);
  const[saveStatus,setSaveStatus]=useState('idle');
  const[viewDate,setViewDate]=useState(getStartOfWeek(new Date()));

  // 1. SYNC LIVE FIREBASE
  useEffect(() => {
    const dataRef = database.ref('trilogiq_planning_live');
    dataRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        if (data.tasks) {
          setTasks(data.tasks.map(t => ({ ...t, start: new Date(t.start) })));
        }
        if (data.operators) setOperators(data.operators);
      }
    });
    return () => dataRef.off();
  }, []);

  // 2. SAUVEGARDE CLOUD
  const handleSave = () => {
    setSaveStatus('saving');
    const payload = {
      tasks: tasks.map(t => ({ ...t, start: t.start.toISOString() })),
      operators: operators,
      lastSync: new Date().toISOString()
    };
    database.ref('trilogiq_planning_live').set(payload)
      .then(() => { setSaveStatus('success'); setTimeout(() => setSaveStatus('idle'), 2000); })
      .catch(() => setSaveStatus('idle'));
  };

  // 3. LOGIQUE D'AFFICHAGE DU PLANNING
  const BASE_DAY_WIDTH = 120;
  const dayOffsets = useMemo(() => {
    const offsets = {}; let cx = 0;
    for(let i=0; i<14; i++) {
        const d = addDays(viewDate, i);
        offsets[d.toDateString()] = cx;
        cx += (d.getDay()===0 || d.getDay()===6) ? 40 : BASE_DAY_WIDTH;
    }
    return offsets;
  }, [viewDate]);

  return(
    <div className="h-screen w-screen bg-[#0f172a] text-gray-200 flex flex-col overflow-hidden">
      <header className="h-20 border-b border-slate-800 px-8 flex items-center justify-between bg-slate-900/30">
        <div className="flex items-center gap-6">
          <h1 className="text-xl font-black text-white tracking-tighter">TRILOGIQ LIVE</h1>
          <div className={`px-4 py-1.5 rounded-full border text-[10px] font-black ${isReadOnly?'border-amber-500 text-amber-500':'border-emerald-500 text-emerald-500'}`}>
            {isReadOnly ? 'LECTURE SEULE' : 'MODE ÉDITION'} 
            <button onClick={()=>setIsReadOnly(!isReadOnly)} className="ml-3 bg-white text-black px-2 py-0.5 rounded">SWITCH</button>
          </div>
        </div>
        <div className="flex items-center gap-4">
          <button onClick={handleSave} className="bg-emerald-600 px-6 py-2 rounded-xl font-black text-xs text-white hover:bg-emerald-500">
            {saveStatus === 'saving' ? 'SYNC...' : 'ENREGISTRER CLOUD'}
          </button>
          <Clock/>
        </div>
      </header>

      <div className="flex-1 overflow-auto relative p-4">
        <div className="relative" style={{width:'2000px', height:`${operators.length * OPERATOR_ROW_HEIGHT}px`}}>
          {/* Grille monteurs */}
          {operators.map((op, idx) => (
            <div key={op.id} className="absolute w-full border-b border-slate-800 flex items-center" style={{top: idx*OPERATOR_ROW_HEIGHT, height: OPERATOR_ROW_HEIGHT}}>
              <div className="sticky left-0 z-20 bg-[#1e293b] w-40 p-4 border-r border-slate-700 font-bold text-xs">
                {op.name}
              </div>
            </div>
          ))}

          {/* Affichage des tâches */}
          {tasks.map(task => {
            return task.operatorIds.map(opId => {
                const opIdx = operators.findIndex(o => o.id === opId);
                const offset = dayOffsets[task.start.toDateString()];
                if (opIdx === -1 || offset === undefined) return null;
                
                const cap = getWorkHoursForDay(task.start);
                const pxH = BASE_DAY_WIDTH / (cap || 8);
                
                return <TaskCard key={`${task.id}-${opId}`} task={task} style={{
                    top: opIdx * OPERATOR_ROW_HEIGHT + 10,
                    left: 160 + offset + (getWorkHoursSinceStart(task.start) * pxH),
                    width: task.duration * pxH,
                    height: OPERATOR_ROW_HEIGHT - 20
                }} />;
            });
          })}
        </div>
      </div>
    </div>
  );
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
